spring:
  application:
    name: lost-found-backend
  datasource:
    url: jdbc:h2:file:./data/lostfound;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      platform: h2
      schema-locations: classpath:schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}

app:
  auth:
    token-hours: 168
  admin:
    account: ${ADMIN_ACCOUNT:admin}
    password: ${ADMIN_PASSWORD:Admin@123456}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,https://shiguang-campus-lost-found.ls1994609633.chatgpt.site}

management:
  endpoints:
    web:
      exposure:
        include: health

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.shiguang.lostfound.auth
  configuration:
    map-underscore-to-camel-case: true
